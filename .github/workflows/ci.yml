name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Tests + Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: agent_runtime_grid_test
        options: >-
          --health-cmd "pg_isready -U testuser -d agent_runtime_grid_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -e .

      - name: Lint (ruff check)
        run: ruff check src tests

      - name: Format check (ruff format)
        run: ruff format --check src tests

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://testuser:testpassword@localhost:5432/agent_runtime_grid_test
          REDIS_URL: redis://localhost:6379/0
          ARTIFACT_ROOT: .artifacts/test
          LLM_MODE: stub
          API_TOKEN: test-token
        run: python -m pytest tests -q --tb=short
