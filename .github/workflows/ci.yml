name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  test:
    name: Tests + Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16.14-alpine3.24@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: agent_runtime_grid_test
        options: >-
          --health-cmd "pg_isready -U testuser -d agent_runtime_grid_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.2.14-alpine3.21@sha256:dfa18828cbc07b3ae6a95ec7343f6c214fdee2d836197b4be8e9904420762cd8
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -e .

      - name: Lint (ruff check)
        run: ruff check src tests

      - name: Format check (ruff format)
        run: ruff format --check src tests

      - name: Verify committed release evidence
        run: agent-runtime-grid verify-committed-evidence

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://testuser:testpassword@localhost:5432/agent_runtime_grid_test
          REDIS_URL: redis://localhost:6379/0
          ARTIFACT_ROOT: .artifacts/test
          LLM_MODE: stub
          API_TOKEN: test-token
        run: python -m pytest tests -q --tb=short
