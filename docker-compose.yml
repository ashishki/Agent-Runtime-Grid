services:
  api:
    image: python:3.12-slim
    working_dir: /app
    command: ["python", "-c", "import agent_runtime_grid; print(agent_runtime_grid.__version__)"]
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+asyncpg://agent_runtime_grid:local-dev-password@postgres:5432/agent_runtime_grid
      REDIS_URL: redis://redis:6379/0
      ARTIFACT_ROOT: /app/artifacts
      LLM_MODE: stub
    volumes:
      - .:/app:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: python:3.12-slim
    working_dir: /app
    command: ["python", "-c", "import agent_runtime_grid; print(agent_runtime_grid.__version__)"]
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+asyncpg://agent_runtime_grid:local-dev-password@postgres:5432/agent_runtime_grid
      REDIS_URL: redis://redis:6379/0
      ARTIFACT_ROOT: /app/artifacts
      LLM_MODE: stub
    volumes:
      - .:/app:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_runtime_grid
      POSTGRES_USER: agent_runtime_grid
      POSTGRES_PASSWORD: local-dev-password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_runtime_grid -d agent_runtime_grid"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_SECURITY_ADMIN_USER: local-admin
      GF_SECURITY_ADMIN_PASSWORD: local-dev-password
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

